<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="2000" viewBox="0 0 1500 2000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f7e9cf"/>
      <stop offset="38%" stop-color="#e6c48d"/>
      <stop offset="70%" stop-color="#7c5a3a"/>
      <stop offset="100%" stop-color="#241710"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="24%" r="40%">
      <stop offset="0%"  stop-color="#fff7e6" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffe6b8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe6b8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#241710" stop-opacity="0"/>
      <stop offset="100%" stop-color="#180f09" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="2000" fill="url(#sky)"/>
  <rect width="1500" height="2000" fill="url(#sun)"/>

  <!-- aleja palm (echo zdjęcia) -->
  <g fill="#3d2f3a" opacity="0.55">
    <g transform="translate(230,760)">
      <rect x="-12" y="0" width="24" height="1240" rx="10"/>
      <path d="M0 0 C-120 -70 -210 -40 -260 10 C-180 -20 -80 -20 0 20 Z"/>
      <path d="M0 0 C 120 -70 210 -40 260 10 C 180 -20 80 -20 0 20 Z"/>
      <path d="M0 -10 C -60 -150 -30 -230 40 -270 C -10 -180 -10 -90 6 -10 Z"/>
      <path d="M0 -10 C 60 -150 30 -230 -40 -270 C 10 -180 10 -90 -6 -10 Z"/>
    </g>
    <g transform="translate(1270,720)">
      <rect x="-12" y="0" width="24" height="1280" rx="10"/>
      <path d="M0 0 C-120 -70 -210 -40 -260 10 C-180 -20 -80 -20 0 20 Z"/>
      <path d="M0 0 C 120 -70 210 -40 260 10 C 180 -20 80 -20 0 20 Z"/>
      <path d="M0 -10 C -60 -150 -30 -230 40 -270 C -10 -180 -10 -90 6 -10 Z"/>
      <path d="M0 -10 C 60 -150 30 -230 -40 -270 C 10 -180 10 -90 -6 -10 Z"/>
    </g>
    <g transform="translate(520,900) scale(0.7)" opacity="0.7">
      <rect x="-12" y="0" width="24" height="1240" rx="10"/>
      <path d="M0 0 C-120 -70 -210 -40 -260 10 C-180 -20 -80 -20 0 20 Z"/>
      <path d="M0 0 C 120 -70 210 -40 260 10 C 180 -20 80 -20 0 20 Z"/>
    </g>
    <g transform="translate(1000,880) scale(0.7)" opacity="0.7">
      <rect x="-12" y="0" width="24" height="1240" rx="10"/>
      <path d="M0 0 C-120 -70 -210 -40 -260 10 C-180 -20 -80 -20 0 20 Z"/>
      <path d="M0 0 C 120 -70 210 -40 260 10 C 180 -20 80 -20 0 20 Z"/>
    </g>
  </g>

  <rect width="1500" height="2000" fill="url(#fade)"/>

  <!-- delikatny podpis / instrukcja -->
  <g font-family="Georgia, 'Cormorant Garamond', serif" text-anchor="middle" fill="#f5eef2">
    <text x="750" y="1500" font-size="120" opacity="0.96">Magdalena &amp; Albert</text>
    <text x="750" y="1590" font-size="52" letter-spacing="14" fill="#e7c987" opacity="0.92">10 · 07 · 2026</text>
  </g>
  <g font-family="Arial, sans-serif" text-anchor="middle" fill="#f5eef2" opacity="0.5">
    <text x="750" y="1930" font-size="30">Dodaj plik images/couple.jpg, aby ustawić własne zdjęcie w tle</text>
  </g>
</svg>
